<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notal00</title>
<style>
@import url('https://fonts.loli.net/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200;1,300&family=Noto+Sans+SC:wght@100;200;300&family=Noto+Serif+SC:wght@200;300&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #fafaff;
  --purple-deep:  #6b4e96;
  --purple-mid:   #a585cc;
  --purple-soft:  #c9aee8;
  --purple-pale:  #ece5f8;
  --purple-ghost: #f5f0fd;
  --text-main:    #2a1e3d;
  --text-sub:     #5e5070;
  --text-muted:   #9e8fb8;
  --name-color:   #8a6bb0;
  --title-color:  #6b4f9a;
  --desc-color:   #8a7aaa;
  --motif-stroke: #a585cc;
  --border-rule:  #ece5f8;
  --input-bg:     #ffffff;
  --tag-active:   #f5f0fd;
  --msg-bg:       #f5f0fd;
  --orb1: 0.14; --orb2: 0.11; --orb3: 0.12;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:           #16121f;
    --purple-deep:  #d4aaff;
    --purple-mid:   #b88ae0;
    --purple-soft:  #9b6ed4;
    --purple-pale:  #3a2b55;
    --purple-ghost: #241b38;
    --text-main:    #f0e8ff;
    --text-sub:     #c8b4e8;
    --text-muted:   #8a7aaa;
    --name-color:   #c9a8f0;
    --title-color:  #c0a0e8;
    --desc-color:   #6e5f8a;
    --motif-stroke: #7a56b0;
    --border-rule:  #3a2b55;
    --input-bg:     #1f1830;
    --tag-active:   #2e2248;
    --msg-bg:       #1f1830;
    --orb1: 0.20; --orb2: 0.16; --orb3: 0.18;
  }
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-main);
  font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', Georgia, serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

/* ORBS */
.orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
.orb-1 { width:520px; height:520px; background:radial-gradient(circle,#c9aee8,transparent 68%); opacity:var(--orb1); top:-130px; left:-150px; animation:drift 20s ease-in-out infinite alternate; }
.orb-2 { width:380px; height:380px; background:radial-gradient(circle,#a585cc,transparent 68%); opacity:var(--orb2); bottom:-50px; right:-90px; animation:drift 26s ease-in-out infinite alternate-reverse; }
.orb-3 { width:260px; height:260px; background:radial-gradient(circle,#d8c4f0,transparent 68%); opacity:var(--orb3); top:46%; left:50%; animation:drift 22s ease-in-out infinite alternate; }
@keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(26px,36px) scale(1.06)} }

/* STARS */
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; background:var(--purple-soft); border-radius:50%; opacity:0; animation:twinkle var(--dur) ease-in-out infinite var(--delay); }
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(.4)} 50%{opacity:.35;transform:scale(1)} }

/* MOTIFS */
.motif { position:fixed; pointer-events:none; z-index:0; }
.motif-tl  { top:32px;    left:32px;   opacity:.12; }
.motif-br  { bottom:48px; right:40px;  opacity:.10; transform:rotate(180deg); }
.motif-mid { top:38%;     right:52px;  opacity:.07; }
.motif-tr  { top:28px;    right:36px;  opacity:.08; }
.motif-bl  { bottom:56px; left:40px;   opacity:.09; }

/* LAYOUT */
.page { position:relative; z-index:1; max-width:700px; margin:0 auto; padding:0 44px; }

/* HEADER */
header { padding-top:96px; padding-bottom:36px; opacity:0; animation:fadeUp 1s ease .1s forwards; }
.eyebrow { font-family:'Cormorant Garamond','Georgia',serif; font-size:11px; letter-spacing:.38em; text-transform:uppercase; color:var(--purple-soft); margin-bottom:18px; }
.site-name { font-family:'Cormorant Garamond','Georgia',serif; font-size:clamp(48px,9vw,76px); font-weight:300; font-style:italic; line-height:1; letter-spacing:-.02em; margin-bottom:22px; color:var(--name-color); }
.site-tagline { font-family:'Cormorant Garamond','Georgia',serif; font-size:12px; font-style:italic; color:var(--purple-soft); letter-spacing:.22em; margin-bottom:20px; }
.header-rule { width:36px; height:1px; background:linear-gradient(90deg,var(--purple-soft),transparent); margin-bottom:20px; }
.site-sub { font-size:12px; color:var(--text-muted); letter-spacing:.1em; line-height:2; }

/* ORNAMENT */
.ornament-rule { display:flex; align-items:center; gap:12px; margin:0 0 52px; opacity:0; animation:fadeUp 1s ease .38s forwards; }
.ornament-rule .line { flex:1; height:1px; background:linear-gradient(90deg,var(--border-rule),transparent); }
.ornament-rule .line.rev { background:linear-gradient(270deg,var(--border-rule),transparent); }
.ornament-rule .diamond { width:5px; height:5px; background:var(--purple-soft); transform:rotate(45deg); flex-shrink:0; }

/* FILTER */
.filter-section { margin-bottom:44px; opacity:0; animation:fadeUp .9s ease .5s forwards; }
.filter-hint { font-family:'Cormorant Garamond','Georgia',serif; font-size:11px; font-style:italic; color:var(--text-muted); letter-spacing:.1em; margin-bottom:22px; }
.filter-groups { display:flex; flex-direction:column; gap:14px; }
.filter-group { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
.filter-group-label { font-family:'Cormorant Garamond','Georgia',serif; font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--text-muted); flex-shrink:0; width:40px; }
.filter-tags { display:flex; flex-wrap:wrap; gap:7px; }
.filter-tag { font-family:'Noto Serif SC','PingFang SC',serif; font-size:11px; letter-spacing:.1em; color:var(--text-sub); border:1px solid var(--border-rule); padding:4px 13px; cursor:pointer; background:transparent; transition:border-color .25s,color .25s,background .25s; user-select:none; -webkit-appearance:none; }
.filter-tag:hover { border-color:var(--purple-soft); color:var(--purple-mid); }
.filter-tag.active { border-color:var(--purple-mid); color:var(--purple-deep); background:var(--tag-active); }

/* WORKS LABEL */
.works-label { font-family:'Cormorant Garamond','Georgia',serif; font-size:10px; letter-spacing:.45em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; opacity:0; animation:fadeUp .9s ease .65s forwards; }

/* WORKS */
.works { display:flex; flex-direction:column; }
.work { display:block; text-decoration:none; color:inherit; padding:36px 0; border-top:1px solid transparent; border-image:linear-gradient(90deg,var(--border-rule) 0%,transparent 100%) 1; position:relative; opacity:0; animation:fadeUp .85s ease forwards; transition:padding-left .4s cubic-bezier(.25,.46,.45,.94); }
.work.hidden { display:none; }
.work::before { content:''; position:absolute; left:-44px; top:0; bottom:0; width:1.5px; background:linear-gradient(to bottom,transparent 10%,var(--purple-soft) 50%,transparent 90%); opacity:0; transition:opacity .35s; }
.work:hover { padding-left:14px; }
.work:hover::before { opacity:1; }

.work-meta { display:flex; align-items:center; gap:16px; margin-bottom:12px; }
.work-num { font-family:'Cormorant Garamond','Georgia',serif; font-size:10px; letter-spacing:.22em; color:var(--purple-soft); flex-shrink:0; }
.work-tags { display:flex; flex-wrap:wrap; }
.work-tag { font-size:11px; letter-spacing:.1em; color:var(--purple-mid); font-family:'Noto Serif SC','PingFang SC',serif; cursor:pointer; transition:color .2s; font-weight:300; }
.work-tag:hover { color:var(--purple-deep); }
.work-tag + .work-tag::before { content:' · '; color:var(--purple-pale); margin:0 5px; }

.work-title { font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei Light',sans-serif; font-size:clamp(19px,3.6vw,28px); font-weight:200; line-height:1.25; letter-spacing:.1em; color:var(--title-color); margin-bottom:10px; transition:color .3s; }
.work:hover .work-title { color:var(--purple-deep); }
.work-desc { font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei Light',sans-serif; font-size:11.5px; color:var(--desc-color); line-height:1.9; letter-spacing:.1em; font-weight:100; }
.work-arrow { position:absolute; right:0; top:40px; font-size:12px; color:var(--purple-soft); opacity:0; transition:opacity .3s,transform .3s; }
.work:hover .work-arrow { opacity:1; transform:translateX(5px); }

.no-results { font-family:'Cormorant Garamond','Georgia',serif; font-size:14px; font-style:italic; color:var(--text-muted); letter-spacing:.08em; padding:40px 0; display:none; }

/* GUESTBOOK */
.guestbook-section { margin-top:64px; padding-top:48px; border-top:1px solid var(--border-rule); opacity:0; animation:fadeUp .9s ease 1.1s forwards; }
.guestbook-title { font-family:'Cormorant Garamond','Georgia',serif; font-size:10px; letter-spacing:.45em; text-transform:uppercase; color:var(--text-muted); margin-bottom:32px; }
.guestbook-form { display:flex; flex-direction:column; gap:12px; margin-bottom:36px; }
.form-row { display:flex; gap:12px; }
.form-input { font-family:'Noto Serif SC','PingFang SC',serif; font-size:12px; letter-spacing:.06em; color:var(--text-main); background:var(--input-bg); border:1px solid var(--border-rule); padding:10px 16px; outline:none; transition:border-color .25s; width:100%; -webkit-appearance:none; }
.form-input::placeholder { color:var(--text-muted); }
.form-input:focus { border-color:var(--purple-soft); }
.form-input.name-input { width:180px; flex-shrink:0; }
textarea.form-input { resize:vertical; min-height:80px; line-height:1.8; }
.form-submit { font-family:'Cormorant Garamond','Georgia',serif; font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--purple-mid); border:1px solid var(--border-rule); background:transparent; padding:9px 24px; cursor:pointer; align-self:flex-end; transition:border-color .25s,color .25s,background .25s; }
.form-submit:hover { border-color:var(--purple-mid); color:var(--purple-deep); background:var(--tag-active); }

.messages { display:flex; flex-direction:column; gap:16px; }
.message { background:var(--msg-bg); border:1px solid var(--border-rule); padding:18px 20px; animation:fadeUp .5s ease forwards; }
.message-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
.message-name { font-family:'Cormorant Garamond','Georgia',serif; font-size:13px; font-style:italic; color:var(--purple-mid); letter-spacing:.1em; }
.message-time { font-family:'Cormorant Garamond','Georgia',serif; font-size:10px; color:var(--text-muted); letter-spacing:.08em; }
.message-body { font-size:12.5px; color:var(--text-sub); line-height:1.9; letter-spacing:.04em; }
.no-messages { font-family:'Cormorant Garamond','Georgia',serif; font-size:13px; font-style:italic; color:var(--text-muted); letter-spacing:.08em; padding:8px 0; }

/* FOOTER */
footer { margin-top:16px; padding:44px 0 80px; border-top:1px solid var(--border-rule); display:flex; justify-content:space-between; align-items:center; opacity:0; animation:fadeUp .9s ease 1.25s forwards; }
.footer-name { font-family:'Cormorant Garamond','Georgia',serif; font-size:13px; font-style:italic; color:var(--text-muted); letter-spacing:.18em; }
.footer-links { display:flex; gap:28px; }
.footer-link { font-family:'Cormorant Garamond','Georgia',serif; font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--purple-mid); text-decoration:none; border-bottom:1px solid transparent; padding-bottom:1px; transition:color .25s,border-color .25s; }
.footer-link:hover { color:var(--purple-deep); border-color:var(--purple-soft); }

@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

@media (max-width: 560px) {
  .page { padding:0 24px; }
  header { padding-top:60px; }
  .work::before { left:-24px; }
  .motif-tl,.motif-br,.motif-mid,.motif-tr,.motif-bl { display:none; }
  .filter-group { flex-direction:column; gap:8px; }
  .filter-group-label { width:auto; }
  .form-row { flex-direction:column; }
  .form-input.name-input { width:100%; }
}

  .back-top { position:fixed; bottom:36px; right:36px; width:36px; height:36px; border:1px solid var(--border-rule); background:var(--bg); color:var(--purple-mid); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .35s,border-color .25s,color .25s; z-index:100; }
.back-top.visible { opacity:1; pointer-events:auto; }
.back-top:hover { border-color:var(--purple-soft); color:var(--purple-deep); }

  .float-rating { position:fixed; bottom:36px; left:36px; border:1px solid var(--border-rule); background:var(--bg); color:var(--purple-mid); font-family:'Cormorant Garamond','Georgia',serif; font-size:10px; letter-spacing:.2em; text-transform:uppercase; padding:9px 16px; cursor:pointer; opacity:.85; transition:opacity .25s,border-color .25s,color .25s; z-index:100; text-decoration:none; display:block; }
.float-rating:hover { opacity:1; border-color:var(--purple-soft); color:var(--purple-deep); }


</style>
</head>

<script>
(function(){
  var el=document.getElementById('stars');
  for(var i=0;i<36;i++){
    var s=document.createElement('div');
    s.className='star';
    var sz=(Math.random()*2.2+0.7).toFixed(1);

function shuffle(a){var b=[].concat(a);for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

shuffled.forEach(function(w,idx){
  var allTags=[w.status].concat(w.cp,[w.len,w.ending],w.margin?['边限']:['非边限'],w.other);
  var dispTags=[w.status].concat(w.cp,[w.len,w.ending],w.other,w.margin?['边限']:[]);
  var seen={};var unique=[];
  dispTags.forEach(function(t){if(!seen[t]){seen[t]=1;unique.push(t);}});

  var a=document.createElement('a');

  a.href=w.url;
  a.target='_blank';
  a.rel='noopener';
  a.dataset.tags=allTags.join(',');
  a.style.animationDelay=(0.72+idx*0.035)+'s';
  a.innerHTML='<div class="work-meta"><span class="work-num">'+String(idx+1).padStart(2,'0')+'</span><div class="work-tags">'+unique.map(function(t){return'<span class="work-tag">'+t+'</span>';}).join('')+'</div></div><div class="work-title">'+w.title+'</div><div class="work-desc">'+w.desc+'</div><span class="work-arrow">&#8594;</span>';
  listEl.appendChild(a);
  workEls.push(a);
});

var knownTags={};
document.querySelectorAll('.filter-tag').forEach(function(b){knownTags[b.dataset.tag]=1;});
var activeTag=null;

function applyFilter(){
  var visible=0;
  workEls.forEach(function(w){
    var tags=w.dataset.tags.split(',');
    var show=!activeTag||tags.indexOf(activeTag)>=0;
    w.classList.toggle('hidden',!show);
    if(show)visible++;
  });
  var idx=1;
  workEls.forEach(function(w){
    if(!w.classList.contains('hidden'))
      w.querySelector('.work-num').textContent=String(idx++).padStart(2,'0');
  });
  noResults.style.display=visible===0?'block':'none';
  worksLabel.innerHTML=activeTag?activeTag+' &nbsp;&middot;&nbsp; '+visible+' 篇':'Works &nbsp;&mdash;&nbsp; '+WORKS.length+' 篇';
}

document.querySelectorAll('.filter-tag').forEach(function(btn){
  btn.addEventListener('click',function(){
    var tag=btn.dataset.tag;
    activeTag=activeTag===tag?null:tag;
    document.querySelectorAll('.filter-tag').forEach(function(b){b.classList.toggle('active',b.dataset.tag===activeTag);});
    applyFilter();
  });
});

listEl.addEventListener('click',function(e){
  var wt=e.target.closest?e.target.closest('.work-tag'):null;
  if(!wt)return;
  var tag=wt.textContent.trim();
  if(!knownTags[tag])return;
  e.preventDefault();e.stopPropagation();
  activeTag=activeTag===tag?null:tag;
  document.querySelectorAll('.filter-tag').forEach(function(b){b.classList.toggle('active',b.dataset.tag===activeTag);});
  applyFilter();
});

function pad(n){return String(n).padStart(2,'0');}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function fmtTime(str){
  var d=new Date(str);
  return d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}

function renderMessages(rows){
  messagesEl.querySelectorAll('.message').forEach(function(m){m.remove();});
  noMsgEl.style.display=rows.length===0?'block':'none';
  rows.forEach(function(m){
    var d=document.createElement('div');
    d.className='message';
    d.innerHTML='<div class="message-header"><span class="message-name">'+esc(m.name)+(m.title?' &nbsp;&middot;&nbsp; <span style="font-style:normal;font-size:12px;color:var(--text-sub)">'+esc(m.title)+'</span>':'')+'</span><span class="message-time">'+fmtTime(m.created_at)+'</span></div><div class="message-body">'+esc(m.body).replace(/\n/g,'<br>')+'</div>';
    messagesEl.appendChild(d);
  });
}

function loadMessages(){
  fetch(SB_URL+'/rest/v1/messages?order=created_at.desc&limit=50',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  })
  .then(function(r){return r.json();})
  .then(function(rows){renderMessages(Array.isArray(rows)?rows:[]);})
  .catch(function(){renderMessages([]);});
}

document.getElementById('gbSubmit').addEventListener('click',function(){
  var name=document.getElementById('gbName').value.trim();
  var title=document.getElementById('gbTitle').value.trim();
  var body=document.getElementById('gbBody').value.trim();
  if(!name||!body){
    if(!name)document.getElementById('gbName').style.borderColor='var(--purple-mid)';

  }
  document.getElementById('gbName').style.borderColor='';
  document.getElementById('gbBody').style.borderColor='';

    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({name:name,title:title||'',body:body})

});
