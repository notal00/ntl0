<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>评分 · notal00</title>
<style>
@import url('https://fonts.loli.net/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200;1,300&family=Noto+Sans+SC:wght@100;200;300&family=Noto+Serif+SC:wght@200;300&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #fafaff;
  --purple-deep:  #6b4e96;
  --purple-mid:   #a585cc;
  --purple-soft:  #c9aee8;
  --purple-pale:  #ece5f8;
  --purple-ghost: #f5f0fd;
  --text-main:    #2a1e3d;
  --text-sub:     #5e5070;
  --text-muted:   #9e8fb8;
  --name-color:   #8a6bb0;
  --title-color:  #6b4f9a;
  --motif-stroke: #a585cc;
  --border-rule:  #ece5f8;
  --input-bg:     #ffffff;
  --tag-active:   #f5f0fd;
  --star-on:      #a585cc;
  --star-off:     #ece5f8;
  --orb1: 0.14; --orb2: 0.11; --orb3: 0.12;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:           #16121f;
    --purple-deep:  #d4aaff;
    --purple-mid:   #b88ae0;
    --purple-soft:  #9b6ed4;
    --purple-pale:  #3a2b55;
    --purple-ghost: #241b38;
    --text-main:    #f0e8ff;
    --text-sub:     #c8b4e8;
    --text-muted:   #8a7aaa;
    --name-color:   #c9a8f0;
    --title-color:  #c0a0e8;
    --motif-stroke: #7a56b0;
    --border-rule:  #3a2b55;
    --input-bg:     #1f1830;
    --tag-active:   #2e2248;
    --star-on:      #b88ae0;
    --star-off:     #3a2b55;
    --orb1: 0.20; --orb2: 0.16; --orb3: 0.18;
  }
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-main);
  font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', Georgia, serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

/* ORBS */
.orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
.orb-1 { width:520px; height:520px; background:radial-gradient(circle,#c9aee8,transparent 68%); opacity:var(--orb1); top:-130px; left:-150px; animation:drift 20s ease-in-out infinite alternate; }
.orb-2 { width:380px; height:380px; background:radial-gradient(circle,#a585cc,transparent 68%); opacity:var(--orb2); bottom:-50px; right:-90px; animation:drift 26s ease-in-out infinite alternate-reverse; }
.orb-3 { width:260px; height:260px; background:radial-gradient(circle,#d8c4f0,transparent 68%); opacity:var(--orb3); top:46%; left:50%; animation:drift 22s ease-in-out infinite alternate; }
@keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(26px,36px) scale(1.06)} }

/* STARS */
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; background:var(--purple-soft); border-radius:50%; opacity:0; animation:twinkle var(--dur) ease-in-out infinite var(--delay); }
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(.4)} 50%{opacity:.35;transform:scale(1)} }

/* MOTIFS */
.motif { position:fixed; pointer-events:none; z-index:0; }
.motif-tl { top:32px; left:32px; opacity:.12; }
.motif-br { bottom:48px; right:40px; opacity:.10; transform:rotate(180deg); }

/* LAYOUT */
.page { position:relative; z-index:1; max-width:700px; margin:0 auto; padding:0 44px; }

/* HEADER */
header { padding-top:96px; padding-bottom:36px; opacity:0; animation:fadeUp 1s ease .1s forwards; }
.back-link { font-family:'Cormorant Garamond','Georgia',serif; font-size:11px; letter-spacing:.25em; text-transform:uppercase; color:var(--purple-soft); margin-bottom:24px; display:inline-block; transition:color .25s; }
.back-link:hover { color:var(--purple-mid); }
.eyebrow { font-family:'Cormorant Garamond','Georgia',serif; font-size:11px; letter-spacing:.38em; text-transform:none; color:var(--purple-soft); margin-bottom:18px; }
.site-name { font-family:'Cormorant Garamond','Georgia',serif; font-size:clamp(36px,7vw,56px); font-weight:300; font-style:italic; line-height:1; letter-spacing:-.02em; margin-bottom:16px; color:var(--name-color); }
.header-rule { width:36px; height:1px; background:linear-gradient(90deg,var(--purple-soft),transparent); margin-bottom:20px; }
.site-sub { font-size:12px; color:var(--text-muted); letter-spacing:.1em; line-height:2; }

/* ORNAMENT */
.ornament-rule { display:flex; align-items:center; gap:12px; margin:0 0 52px; opacity:0; animation:fadeUp 1s ease .38s forwards; }
.ornament-rule .line { flex:1; height:1px; background:linear-gradient(90deg,var(--border-rule),transparent); }
.ornament-rule .line.rev { background:linear-gradient(270deg,var(--border-rule),transparent); }
.ornament-rule .diamond { width:5px; height:5px; background:var(--purple-soft); transform:rotate(45deg); flex-shrink:0; }

/* TABS */
.tabs { display:flex; gap:24px; margin-bottom:44px; opacity:0; animation:fadeUp .9s ease .45s forwards; border-bottom:1px solid var(--border-rule); }
.tab { font-family:'Cormorant Garamond','Georgia',serif; font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:var(--text-muted); padding-bottom:14px; cursor:pointer; border-bottom:1px solid transparent; margin-bottom:-1px; transition:color .25s,border-color .25s; }
.tab.active { color:var(--purple-mid); border-color:var(--purple-mid); }
.tab:hover { color:var(--purple-mid); }

/* RATING LIST */
.rating-list { display:flex; flex-direction:column; opacity:0; animation:fadeUp .9s ease .55s forwards; }

.rating-item {
  padding:28px 0;
  border-top:1px solid transparent;
  border-image:linear-gradient(90deg,var(--border-rule) 0%,transparent 100%) 1;
  display:flex; align-items:center; gap:20px;
  opacity:0; animation:fadeUp .7s ease forwards;
}

.rating-num { font-family:'Cormorant Garamond','Georgia',serif; font-size:10px; letter-spacing:.22em; color:var(--purple-soft); flex-shrink:0; width:24px; }
.rating-info { flex:1; min-width:0; }
.rating-title { font-family:'Noto Sans SC','PingFang SC',sans-serif; font-size:clamp(14px,2.8vw,18px); font-weight:200; letter-spacing:.08em; color:var(--title-color); margin-bottom:6px; }
.rating-avg { display:flex; align-items:center; gap:8px; }
.stars-display { display:flex; gap:2px; }
.star-icon { font-size:12px; color:var(--star-off); transition:color .15s; }
.star-icon.on { color:var(--star-on); }
.rating-score { font-family:'Cormorant Garamond','Georgia',serif; font-size:11px; color:var(--text-muted); letter-spacing:.08em; }
.rating-count { font-family:'Cormorant Garamond','Georgia',serif; font-size:10px; color:var(--text-muted); letter-spacing:.06em; }

/* STAR INPUT */
.stars-input { display:flex; gap:4px; flex-shrink:0; }
.star-btn { font-size:20px; color:var(--star-off); cursor:pointer; transition:color .15s, transform .15s; background:none; border:none; padding:2px; line-height:1; -webkit-appearance:none; }
.star-btn.hover, .star-btn.selected { color:var(--star-on); }
.star-btn:active { transform:scale(1.2); }

/* SUBMIT FEEDBACK */
.submit-feedback { font-family:'Cormorant Garamond','Georgia',serif; font-size:11px; font-style:italic; color:var(--purple-soft); letter-spacing:.1em; margin-left:4px; opacity:0; transition:opacity .3s; flex-shrink:0; }
.submit-feedback.show { opacity:1; }

/* RANKING VIEW */
.ranking-list { display:flex; flex-direction:column; opacity:0; animation:fadeUp .9s ease .55s forwards; }
.rank-item {
  padding:24px 0;
  border-top:1px solid transparent;
  border-image:linear-gradient(90deg,var(--border-rule) 0%,transparent 100%) 1;
  display:flex; align-items:center; gap:16px;
  opacity:0; animation:fadeUp .7s ease forwards;
}
.rank-pos { font-family:'Cormorant Garamond','Georgia',serif; font-size:22px; font-style:italic; color:var(--purple-pale); width:32px; flex-shrink:0; line-height:1; }
.rank-pos.top { color:var(--purple-soft); }
.rank-info { flex:1; }
.rank-title { font-family:'Noto Sans SC','PingFang SC',sans-serif; font-size:clamp(14px,2.8vw,18px); font-weight:200; letter-spacing:.08em; color:var(--title-color); margin-bottom:6px; }
.rank-stars { display:flex; align-items:center; gap:8px; }
.rank-bar-wrap { flex:1; height:2px; background:var(--border-rule); max-width:120px; }
.rank-bar { height:2px; background:var(--purple-soft); transition:width .6s ease; }
.rank-score { font-family:'Cormorant Garamond','Georgia',serif; font-size:12px; color:var(--purple-mid); letter-spacing:.06em; }
.rank-count { font-family:'Cormorant Garamond','Georgia',serif; font-size:10px; color:var(--text-muted); letter-spacing:.06em; }
.no-data { font-family:'Cormorant Garamond','Georgia',serif; font-size:13px; font-style:italic; color:var(--text-muted); letter-spacing:.08em; padding:40px 0; }

/* FOOTER */
footer { margin-top:16px; padding:44px 0 80px; border-top:1px solid var(--border-rule); display:flex; justify-content:space-between; align-items:center; opacity:0; animation:fadeUp .9s ease 1s forwards; }
.footer-name { font-family:'Cormorant Garamond','Georgia',serif; font-size:13px; font-style:italic; color:var(--text-muted); letter-spacing:.18em; }
.footer-link { font-family:'Cormorant Garamond','Georgia',serif; font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--purple-mid); border-bottom:1px solid transparent; padding-bottom:1px; transition:color .25s,border-color .25s; }
.footer-link:hover { color:var(--purple-deep); border-color:var(--purple-soft); }

/* BACK TO TOP */
.back-top { position:fixed; bottom:36px; right:36px; width:36px; height:36px; border:1px solid var(--border-rule); background:var(--bg); color:var(--purple-mid); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .35s,border-color .25s,color .25s; z-index:100; }
.back-top.visible { opacity:1; pointer-events:auto; }
.back-top:hover { border-color:var(--purple-soft); color:var(--purple-deep); }

@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

@media (max-width: 560px) {
  .page { padding:0 24px; }
  header { padding-top:60px; }
  .motif-tl,.motif-br { display:none; }
  .rating-item { gap:12px; }
  .rank-bar-wrap { display:none; }
}
</style>
</head>

<script>
// Stars bg
(function(){
  var el=document.getElementById('stars');
  for(var i=0;i<28;i++){
    var s=document.createElement('div'); s.className='star';
    var sz=(Math.random()*2.2+0.7).toFixed(1);
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100).toFixed(1)+'%;top:'+(Math.random()*100).toFixed(1)+'%;--dur:'+(Math.random()*4+3).toFixed(1)+'s;--delay:-'+(Math.random()*7).toFixed(1)+'s;';
    el.appendChild(s);
  }
})();

var SB_URL='https://zkpctzxyqpiiqxvnmauo.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprcGN0enh5cXBpaXF4dm5tYXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNDkxNDAsImV4cCI6MjA5MDkyNTE0MH0.Z7WdneCs_vJOblWho1neuMLI86h1FrdNqi6N2-DI4ZQ';

var WORKS=[
  "不想恋爱的理由","繁荫","Dionysus","醒酒","温和的轭","降雪线","春风沉醉",
  "福灵剂只需要一滴","睡美人","Lucent","我哥分手了吗","California","Purple rain",
  "夜间巴士","智齿","过春天","沙漏","摘星","苦玫瑰","AAA机械道具","温和疗愈",
  "心房隔壁","孪生异梦","初恋","Drowning drawing","珍珠陷阱","男朋友的推荐法",
  "更衣室","兼职生","神曲","爱神","咬尾巴","礼物与灵药","出入口","夜间飞行","瘦桥"
];

// scores: { title -> {sum, count} }
var scores={};
WORKS.forEach(function(t){ scores[t]={sum:0,count:0}; });

function loadScores(cb){
  fetch(SB_URL+'/rest/v1/ratings?select=title,score',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  })
  .then(function(r){return r.json();})
  .then(function(rows){
    WORKS.forEach(function(t){ scores[t]={sum:0,count:0}; });
    if(Array.isArray(rows)){
      rows.forEach(function(r){
        if(scores[r.title]!==undefined){
          scores[r.title].sum+=r.score;
          scores[r.title].count+=1;
        }
      });
    }
    cb();
  })
  .catch(function(){ cb(); });
}

function avg(t){
  var s=scores[t];
  return s.count>0 ? (s.sum/s.count) : 0;
}

function starsHtml(val, max){
  max=max||5;
  var html='';
  for(var i=1;i<=max;i++){
    var cls=i<=Math.round(val)?'star-icon on':'star-icon';
    html+='<span class="'+cls+'">&#9733;</span>';
  }
  return html;
}

// ── RATE VIEW
function buildRateList(){
  var el=document.getElementById('ratingList');
  el.innerHTML='';
  WORKS.forEach(function(title,idx){
    var s=scores[title];
    var avgVal=s.count>0?(s.sum/s.count).toFixed(1):'-';
    var item=document.createElement('div');
    item.className='rating-item';
    item.style.animationDelay=(0.05*idx)+'s';
    item.innerHTML=
      '<div class="rating-num">'+String(idx+1).padStart(2,'0')+'</div>'+
      '<div class="rating-info">'+
        '<div class="rating-title">'+title+'</div>'+
        '<div class="rating-avg">'+
          '<div class="stars-display" id="disp-'+idx+'">'+starsHtml(s.count>0?s.sum/s.count:0)+'</div>'+
          '<span class="rating-score" id="score-'+idx+'">'+(s.count>0?avgVal+'分':'暂无评分')+'</span>'+
          '<span class="rating-count" id="count-'+idx+'">'+(s.count>0?'('+s.count+'人)':'')+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="stars-input" id="input-'+idx+'"></div>'+
      '<span class="submit-feedback" id="fb-'+idx+'">已提交</span>';

    // build star buttons
    var inputEl=item.querySelector('#input-'+idx);
    for(var star=1;star<=5;star++){
      (function(s,t,i){
        var btn=document.createElement('button');
        btn.className='star-btn';
        btn.innerHTML='&#9733;';
        btn.setAttribute('data-star',s);
        btn.addEventListener('mouseenter',function(){ hoverStars(i,s); });
        btn.addEventListener('mouseleave',function(){ resetStars(i); });
        btn.addEventListener('touchend',function(e){ e.preventDefault(); submitRating(t,s,i); },{ passive:false });
        btn.addEventListener('click',function(){ submitRating(t,s,i); });
        inputEl.appendChild(btn);
      })(star,title,idx);
    }

    el.appendChild(item);
  });
}

function hoverStars(idx,val){
  var btns=document.querySelectorAll('#input-'+idx+' .star-btn');
  btns.forEach(function(b,i){ b.classList.toggle('hover',i<val); });
}

function resetStars(idx){
  var btns=document.querySelectorAll('#input-'+idx+' .star-btn');
  btns.forEach(function(b){ b.classList.remove('hover','selected'); });
}

function submitRating(title,score,idx){
  // visual feedback immediately
  var btns=document.querySelectorAll('#input-'+idx+' .star-btn');
  btns.forEach(function(b,i){ b.classList.toggle('selected',i<score); b.classList.remove('hover'); });
  var fb=document.getElementById('fb-'+idx);
  fb.classList.add('show');
  setTimeout(function(){ fb.classList.remove('show'); },1500);

  fetch(SB_URL+'/rest/v1/ratings',{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({title:title,score:score})
  })
  .then(function(r){
    if(r.ok){
      // update local scores
      scores[title].sum+=score;
      scores[title].count+=1;
      updateScoreDisplay(title,idx);
    }
  })
  .catch(function(){});
}

function updateScoreDisplay(title,idx){
  var s=scores[title];
  var avgVal=(s.sum/s.count).toFixed(1);
  var dispEl=document.getElementById('disp-'+idx);
  var scoreEl=document.getElementById('score-'+idx);
  var countEl=document.getElementById('count-'+idx);
  if(dispEl) dispEl.innerHTML=starsHtml(s.sum/s.count);
  if(scoreEl) scoreEl.textContent=avgVal+'分';
  if(countEl) countEl.textContent='('+s.count+'人)';
}

// ── RANK VIEW
function buildRankList(){
  var el=document.getElementById('rankingList');
  el.innerHTML='';

  var rated=WORKS.filter(function(t){ return scores[t].count>0; });
  if(rated.length===0){
    el.innerHTML='<div class="no-data">还没有评分数据，去打第一个分吧。</div>';
    return;
  }

  rated.sort(function(a,b){
    var da=scores[a], db=scores[b];
    var avgA=da.sum/da.count, avgB=db.sum/db.count;
    if(avgB!==avgA) return avgB-avgA;
    return db.count-da.count;
  });

  var maxAvg=scores[rated[0]].sum/scores[rated[0]].count;

  rated.forEach(function(title,idx){
    var s=scores[title];
    var avgVal=(s.sum/s.count).toFixed(1);
    var barPct=maxAvg>0?((s.sum/s.count)/5*100).toFixed(0):0;
    var item=document.createElement('div');
    item.className='rank-item';
    item.style.animationDelay=(0.05*idx)+'s';
    item.innerHTML=
      '<div class="rank-pos'+(idx<3?' top':'')+'">'+String(idx+1).padStart(2,'0')+'</div>'+
      '<div class="rank-info">'+
        '<div class="rank-title">'+title+'</div>'+
        '<div class="rank-stars">'+
          '<div class="stars-display">'+starsHtml(s.sum/s.count)+'</div>'+
          '<div class="rank-bar-wrap"><div class="rank-bar" style="width:'+barPct+'%"></div></div>'+
          '<span class="rank-score">'+avgVal+'</span>'+
          '<span class="rank-count">('+s.count+'人)</span>'+
        '</div>'+
      '</div>';
    el.appendChild(item);
  });
}

// ── TABS
var currentTab='rate';
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabRate').classList.toggle('active',tab==='rate');
  document.getElementById('tabRank').classList.toggle('active',tab==='rank');
  document.getElementById('viewRate').style.display=tab==='rate'?'block':'none';
  document.getElementById('viewRank').style.display=tab==='rank'?'block':'none';
  if(tab==='rank') buildRankList();
}

// ── INIT
loadScores(function(){
  buildRateList();
});

// Back to top
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){ backTop.classList.toggle('visible',window.scrollY>400); });
backTop.addEventListener('click',function(){ window.scrollTo({top:0,behavior:'smooth'}); });
</script>
